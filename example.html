<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      *,
      body {
        margin: 0;
        padding: 0;
        font-family:
          "Lucida Sans", "Lucida Sans Regular", "Lucida Grande",
          "Lucida Sans Unicode", Geneva, Verdana, sans-serif;
      }

      .header {
        background-color: rgb(126, 178, 200);
        width: 100%;
        height: 60px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        width: 60%;
      }

      button {
        background-color: navy;
        color: white;
        padding: 8px 14px;
        margin: 0 10px;
        cursor: pointer;
      }

      button:hover {
        background-color: rgb(77, 77, 173);
      }

      button:focus {
        background-color: rgb(2, 2, 53);
      }

      .content {
        background-color: rgb(221, 230, 238);
        height: calc(100vh - 60px);
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="container">
        <button>Home</button>
        <button>About</button>
        <button>Contact us</button>
      </div>
    </div>
    <div class="content">
      <h1>The is my new website</h1>
    </div>
  </body>
</html>
